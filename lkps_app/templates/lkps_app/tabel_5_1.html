{% extends 'lkps_app/base.html' %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card card-modern">
            <div class="card-header card-header-modern d-flex justify-content-between align-items-center">
                <div>
                    <h3 class="card-title">Tabel 5.1: Sistem Tata Kelola</h3>
                    <small class="text-muted">Isi daftar sistem informasi yang digunakan di UPPS/Program Studi.</small>
                </div>
                <button type="button" class="btn btn-sm btn-primary" id="btn-tambah-baris">
                    <i class="fas fa-plus me-1"></i> Tambah Baris
                </button>
            </div>
            
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="tabel-tata-kelola">
                        <thead class="table-light">
                            <tr>
                                <th width="5%" class="text-center">No</th>
                                <th width="20%">Jenis Tata Kelola</th>
                                <th width="25%">Nama Sistem Informasi</th>
                                <th width="15%">Akses</th>
                                <th width="20%">Unit Pengelola</th>
                                <th width="10%">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-tata-kelola">
                            <tr>
                                <td class="text-center baris-nomor">1</td>
                                <td>
                                    <select class="form-select form-select-sm auto-save-input" name="jenis_tata_kelola[]">
                                        <option value="Pendidikan">Pendidikan</option>
                                        <option value="Keuangan">Keuangan</option>
                                        <option value="SDM">SDM</option>
                                        <option value="Sarana Prasarana">Sarana Prasarana</option>
                                        <option value="Lainnya">Lainnya...</option>
                                    </select>
                                </td>
                                <td><input type="text" class="form-control form-control-sm auto-save-input" name="nama_sistem[]" placeholder="Contoh: SIAKAD"></td>
                                <td>
                                    <select class="form-select form-select-sm auto-save-input" name="akses[]">
                                        <option value="Internet">Internet</option>
                                        <option value="Lokal">Lokal</option>
                                    </select>
                                </td>
                                <td><input type="text" class="form-control form-control-sm auto-save-input" name="unit_pengelola[]" placeholder="Biro / Unit"></td>
                                <td class="text-center">
                                    <button type="button" class="btn btn-sm btn-outline-danger btn-hapus-baris" disabled>
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white text-end py-3">
                 <span class="save-status me-3" id="table-save-status"><i class="fas fa-check-circle"></i> Semua data tersimpan</span>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tbody = document.getElementById('tbody-tata-kelola');
        const btnTambah = document.getElementById('btn-tambah-baris');

        // Fungsi untuk mengurutkan ulang nomor baris
        function updateNomor() {
            const baris = tbody.querySelectorAll('tr');
            baris.forEach((tr, index) => {
                tr.querySelector('.baris-nomor').textContent = index + 1;
                // Aktifkan tombol hapus jika baris > 1
                const btnHapus = tr.querySelector('.btn-hapus-baris');
                if (baris.length > 1) {
                    btnHapus.removeAttribute('disabled');
                } else {
                    btnHapus.setAttribute('disabled', 'true');
                }
            });
        }

        // Event listener untuk Tambah Baris
        btnTambah.addEventListener('click', function() {
            // Mengambil baris pertama sebagai template
            const barisPertama = tbody.querySelector('tr');
            const barisBaru = barisPertama.cloneNode(true);
            
            // Mengosongkan input text pada baris baru
            const inputs = barisBaru.querySelectorAll('input[type="text"]');
            inputs.forEach(input => input.value = '');

            // Menambahkan baris baru ke tabel
            tbody.appendChild(barisBaru);
            updateNomor();
        });

        // Event listener untuk Hapus Baris (menggunakan Event Delegation)
        tbody.addEventListener('click', function(e) {
            // Mencari elemen button atau icon trash yang diklik
            const btnHapus = e.target.closest('.btn-hapus-baris');
            if (btnHapus && !btnHapus.hasAttribute('disabled')) {
                const tr = btnHapus.closest('tr');
                tr.remove();
                updateNomor();
            }
        });
    });
</script>
{% endblock %}
