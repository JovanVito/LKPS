{% extends 'lkps_app/base.html' %}

{% block content %}
<div class="card card-modern border-top-blue">
    <div class="card-header card-header-modern d-flex justify-content-between align-items-center">
        <div>
            <h3 class="card-title">Tabel 1: Kerjasama</h3>
            <small class="text-muted">Daftar kerjasama institusi/prodi dengan mitra terkait Pendidikan, Penelitian, atau PkM.</small>
        </div>
        <button class="btn btn-sm btn-primary" id="btn-tambah-baris">
            <i class="fas fa-plus me-1"></i> Tambah Mitra
        </button>
    </div>
    
    <div class="card-body p-0">
        <div class="table-responsive" style="max-height: 65vh; overflow-y: auto;">
            <table class="table table-bordered table-hover align-middle mb-0 text-center" style="min-width: 1200px;">
                <thead class="table-light sticky-top">
                    <tr>
                        <th width="5%">No</th>
                        <th width="20%">Lembaga Mitra</th>
                        <th width="15%">Tingkat (Int/Nas/Lokal)</th>
                        <th width="20%">Judul/Kegiatan Kerjasama</th>
                        <th width="20%">Manfaat bagi PS</th>
                        <th width="10%">Tahun / Durasi</th>
                        <th width="10%">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbody-dinamis">
                    <tr>
                        <td class="baris-nomor">1</td>
                        <td><input type="text" class="form-control form-control-sm auto-save-input" name="lembaga_mitra[]" placeholder="Contoh: PT Telkom"></td>
                        <td>
                            <select class="form-select form-select-sm auto-save-input" name="tingkat_kerjasama[]">
                                <option value="Internasional">Internasional</option>
                                <option value="Nasional">Nasional</option>
                                <option value="Wilayah/Lokal">Wilayah/Lokal</option>
                            </select>
                        </td>
                        <td><textarea class="form-control form-control-sm auto-save-input" name="judul_kegiatan[]" rows="2" placeholder="Program Magang..."></textarea></td>
                        <td><textarea class="form-control form-control-sm auto-save-input" name="manfaat[]" rows="2" placeholder="Tempat PKL mahasiswa"></textarea></td>
                        <td><input type="text" class="form-control form-control-sm text-center auto-save-input" name="durasi[]" placeholder="2024 - 2026"></td>
                        <td>
                            <button type="button" class="btn btn-sm btn-outline-danger btn-hapus-baris" disabled><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Script Dinamis (Sama persis seperti tabel sebelumnya)
    document.addEventListener('DOMContentLoaded', function() {
        const tbody = document.getElementById('tbody-dinamis');
        const btnTambah = document.getElementById('btn-tambah-baris');

        function updateNomor() {
            const baris = tbody.querySelectorAll('tr');
            baris.forEach((tr, index) => {
                tr.querySelector('.baris-nomor').textContent = index + 1;
                const btnHapus = tr.querySelector('.btn-hapus-baris');
                if (baris.length > 1) { btnHapus.removeAttribute('disabled'); } 
                else { btnHapus.setAttribute('disabled', 'true'); }
            });
        }

        btnTambah.addEventListener('click', function() {
            const barisBaru = tbody.querySelector('tr').cloneNode(true);
            const inputs = barisBaru.querySelectorAll('input[type="text"], textarea');
            inputs.forEach(input => input.value = '');
            tbody.appendChild(barisBaru);
            updateNomor();
        });

        tbody.addEventListener('click', function(e) {
            const btnHapus = e.target.closest('.btn-hapus-baris');
            if (btnHapus && !btnHapus.hasAttribute('disabled')) {
                btnHapus.closest('tr').remove();
                updateNomor();
            }
        });
    });
</script>
{% endblock %}
