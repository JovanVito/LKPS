{% extends 'lkps_app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        
        <div class="alert bg-white border-0 shadow-sm rounded-4 mb-4 d-flex align-items-center" style="border-left: 5px solid var(--pradita-blue) !important;">
            <div class="icon-box icon-box-blue mb-0 border-0">
                <i class="fas fa-info-circle"></i>
            </div>
            <div>
                <h6 class="fw-bold mb-1" style="color: var(--pradita-navy);">Pengisian Otomatis</h6>
                <p class="text-muted mb-0 small">Sistem akan menyimpan setiap ketikan Anda. Anda dapat meninggalkan halaman ini kapan saja.</p>
            </div>
        </div>

        <div class="card card-modern border-top-orange">
            <div class="card-header card-header-modern d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <div class="icon-box icon-box-orange">
                        <i class="fas fa-file-signature"></i>
                    </div>
                    <div>
                        <h3 class="card-title">Identitas Pengusul</h3>
                        <small class="text-muted">Lengkapi profil Program Studi dan Universitas.</small>
                    </div>
                </div>
                <span class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill border border-success border-opacity-25">
                    <i class="fas fa-check-circle me-1"></i> Tersimpan
                </span>
            </div>
            
            <div class="card-body p-4">
                <form id="form-identitas">
                    {% csrf_token %}
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Program Studi</label>
                            <select class="form-select auto-save-input" name="program_studi">
                                <option value="">-- Pilih Program Studi --</option>
                                <option value="1">S1 Informatika</option>
                                <option value="2">S1 Sistem Informasi</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                             <label class="form-label">Unit Pengelola Program Studi (UPPS)</label>
                             <input type="text" class="form-control auto-save-input" name="unit_pengelola" placeholder="Masukkan nama Fakultas/Sekolah Tinggi">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                             <label class="form-label">Perguruan Tinggi</label>
                             <input type="text" class="form-control" name="perguruan_tinggi" value="Universitas Pradita" readonly style="background-color: #E2E8F0;">
                        </div>
                        <div class="col-md-6">
                             <label class="form-label">Kota Pendirian</label>
                             <input type="text" class="form-control auto-save-input" name="kota_pendirian" value="Tangerang">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
