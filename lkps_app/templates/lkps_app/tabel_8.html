{% extends 'lkps_app/base.html' %}

{% block content %}
<div class="card card-modern border-top-teal">
    <div class="card-header card-header-modern d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <div class="icon-box icon-box-teal">
                <i class="fas fa-hands-helping"></i>
            </div>
            <div>
                <h3 class="card-title">Tabel 8: Pengabdian kepada Masyarakat (PkM)</h3>
                <small class="text-muted">Daftar PkM dosen tetap sesuai bidang keilmuan PS dalam 3 tahun terakhir.</small>
            </div>
        </div>
        <button class="btn btn-sm btn-primary" style="background-color: var(--lms-teal); border: none;" id="btn-tambah-baris">
            <i class="fas fa-plus me-1"></i> Tambah PkM
        </button>
    </div>
    
    <div class="card-body p-0">
        <div class="table-responsive" style="max-height: 65vh; overflow-y: auto;">
            <table class="table table-bordered table-hover align-middle mb-0 text-center" style="min-width: 1200px;">
                <thead class="table-light sticky-top">
                    <tr>
                        <th width="5%">No</th>
                        <th width="20%">Nama Dosen</th>
                        <th width="25%">Tema / Judul PkM</th>
                        <th width="15%">Melibatkan Mahasiswa?</th>
                        <th width="15%">Sumber Pembiayaan</th>
                        <th width="10%">Tahun</th>
                        <th width="10%">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbody-dinamis">
                    <tr>
                        <td class="baris-nomor">1</td>
                        <td><input type="text" class="form-control form-control-sm auto-save-input" name="nama_dosen_pkm[]" placeholder="Nama Lengkap"></td>
                        <td><textarea class="form-control form-control-sm auto-save-input" name="judul_pkm[]" rows="2" placeholder="Judul Pengabdian..."></textarea></td>
                        <td>
                            <select class="form-select form-select-sm auto-save-input" name="libat_mhs_pkm[]">
                                <option value="Ya">Ya</option>
                                <option value="Tidak">Tidak</option>
                            </select>
                        </td>
                        <td>
                            <select class="form-select form-select-sm auto-save-input" name="sumber_dana_pkm[]">
                                <option value="Mandiri">Mandiri / PT</option>
                                <option value="Kementerian">Kementerian</option>
                                <option value="Lembaga Lain">Lembaga Lainnya</option>
                            </select>
                        </td>
                        <td><input type="number" class="form-control form-control-sm text-center auto-save-input" name="tahun_pkm[]" placeholder="2025"></td>
                        <td>
                            <button type="button" class="btn btn-sm btn-outline-danger btn-hapus-baris" disabled><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Script Dinamis (Sama dengan tabel sebelumnya)
    document.addEventListener('DOMContentLoaded', function() {
        const tbody = document.getElementById('tbody-dinamis');
        const btnTambah = document.getElementById('btn-tambah-baris');
        function updateNomor() {
            const baris = tbody.querySelectorAll('tr');
            baris.forEach((tr, index) => {
                tr.querySelector('.baris-nomor').textContent = index + 1;
                const btnHapus = tr.querySelector('.btn-hapus-baris');
                if (baris.length > 1) { btnHapus.removeAttribute('disabled'); } 
                else { btnHapus.setAttribute('disabled', 'true'); }
            });
        }
        btnTambah.addEventListener('click', function() {
            const barisBaru = tbody.querySelector('tr').cloneNode(true);
            const inputs = barisBaru.querySelectorAll('input[type="text"], input[type="number"], textarea');
            inputs.forEach(input => input.value = '');
            tbody.appendChild(barisBaru);
            updateNomor();
        });
        tbody.addEventListener('click', function(e) {
            const btnHapus = e.target.closest('.btn-hapus-baris');
            if (btnHapus && !btnHapus.hasAttribute('disabled')) {
                btnHapus.closest('tr').remove();
                updateNomor();
            }
        });
    });
</script>
{% endblock %}
