{% extends 'lkps_app/base.html' %}

{% block content %}
<div class="card card-modern">
    <div class="card-header card-header-modern d-flex justify-content-between align-items-center">
        <div>
            <h3 class="card-title">Tabel 7: Penelitian Dosen Tetap</h3>
            <small class="text-muted">Daftar penelitian dosen tetap sesuai bidang keilmuan PS dalam 3 tahun terakhir.</small>
        </div>
        <button class="btn btn-sm btn-primary" id="btn-tambah-baris">
            <i class="fas fa-plus me-1"></i> Tambah Penelitian
        </button>
    </div>
    
    <div class="card-body p-0">
        <div class="table-responsive" style="max-height: 65vh; overflow-y: auto;">
            <table class="table table-bordered table-hover align-middle mb-0 text-center" style="min-width: 1200px;">
                <thead class="table-light sticky-top">
                    <tr>
                        <th width="5%">No</th>
                        <th width="15%">Nama Dosen</th>
                        <th width="25%">Tema / Judul Penelitian</th>
                        <th width="15%">Melibatkan Mahasiswa?</th>
                        <th width="20%">Sumber Pembiayaan</th>
                        <th width="10%">Tahun</th>
                        <th width="10%">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbody-dinamis">
                    <tr>
                        <td class="baris-nomor">1</td>
                        <td><input type="text" class="form-control form-control-sm auto-save-input" name="nama_dosen_peneliti[]" placeholder="Nama Lengkap"></td>
                        <td><textarea class="form-control form-control-sm auto-save-input" name="judul_penelitian[]" rows="2" placeholder="Judul Penelitian..."></textarea></td>
                        <td>
                            <select class="form-select form-select-sm auto-save-input" name="libat_mahasiswa[]">
                                <option value="Ya">Ya</option>
                                <option value="Tidak">Tidak</option>
                            </select>
                        </td>
                        <td>
                            <select class="form-select form-select-sm auto-save-input" name="sumber_dana_penelitian[]">
                                <option value="Mandiri">Mandiri / Perguruan Tinggi</option>
                                <option value="Kementerian">Kementerian / Nasional</option>
                                <option value="Luar Negeri">Institusi Luar Negeri</option>
                            </select>
                        </td>
                        <td><input type="number" class="form-control form-control-sm text-center auto-save-input" name="tahun_penelitian[]" placeholder="2025"></td>
                        <td>
                            <button type="button" class="btn btn-sm btn-outline-danger btn-hapus-baris" disabled><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Copy paste script Javascript yang sama persis seperti di tabel_1.html di atas
    document.addEventListener('DOMContentLoaded', function() {
        const tbody = document.getElementById('tbody-dinamis');
        const btnTambah = document.getElementById('btn-tambah-baris');
        function updateNomor() { /* ... logika sama ... */ 
            const baris = tbody.querySelectorAll('tr');
            baris.forEach((tr, index) => {
                tr.querySelector('.baris-nomor').textContent = index + 1;
                const btnHapus = tr.querySelector('.btn-hapus-baris');
                if (baris.length > 1) { btnHapus.removeAttribute('disabled'); } 
                else { btnHapus.setAttribute('disabled', 'true'); }
            });
        }
        btnTambah.addEventListener('click', function() {
            const barisBaru = tbody.querySelector('tr').cloneNode(true);
            const inputs = barisBaru.querySelectorAll('input[type="text"], input[type="number"], textarea');
            inputs.forEach(input => input.value = '');
            tbody.appendChild(barisBaru);
            updateNomor();
        });
        tbody.addEventListener('click', function(e) {
            const btnHapus = e.target.closest('.btn-hapus-baris');
            if (btnHapus && !btnHapus.hasAttribute('disabled')) {
                btnHapus.closest('tr').remove();
                updateNomor();
            }
        });
    });
</script>
{% endblock %}
