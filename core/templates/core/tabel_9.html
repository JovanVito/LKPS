{% extends 'core/base.html' %}
{% block content %}
<form id="form-tabel-9" method="POST">
    {% csrf_token %}
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">Tabel 9: Luaran dan Capaian Tridharma</h5>
            <button type="button" class="btn btn-primary btn-sm rounded-pill" id="btn-tambah-9">
                <i class="fas fa-plus me-1"></i> Tambah Luaran
            </button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table align-middle text-center mb-0">
                    <thead class="table-light">
                        <tr>
                            <th width="5%">No</th>
                            <th width="40%">Judul Luaran</th>
                            <th width="20%">Jenis Luaran</th>
                            <th width="15%">Tahun</th>
                            <th width="15%">Keterangan</th>
                            <th width="5%">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-9">
                        <tr>
                            <td class="no">1</td>
                            <td><input type="text" name="judul[]" class="form-control form-control-sm border-0 bg-light" placeholder="Judul Penelitian/HAKI"></td>
                            <td>
                                <select name="jenis[]" class="form-select form-select-sm border-0 bg-light">
                                    <option value="Paten">Paten</option>
                                    <option value="Hak Cipta">Hak Cipta</option>
                                    <option value="Teknologi Tepat Guna">TTG</option>
                                </select>
                            </td>
                            <td><input type="number" name="tahun[]" class="form-control form-control-sm border-0 bg-light" value="2026"></td>
                            <td><input type="text" name="ket[]" class="form-control form-control-sm border-0 bg-light"></td>
                            <td><button type="button" class="btn btn-link text-danger btn-hapus"><i class="fas fa-trash"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white text-end">
            <small id="sync-status" class="text-success"><i class="fas fa-check-circle"></i> Autosave Aktif</small>
        </div>
    </div>
</form>



<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tbody = document.getElementById('tbody-9');
        const form = document.getElementById('form-tabel-9');
        let timer;

        function sync() {
            document.getElementById('sync-status').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
            clearTimeout(timer);
            timer = setTimeout(() => {
                fetch(window.location.pathname, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest', 'X-CSRFToken': '{{ csrf_token }}' }
                })
                .then(res => res.json())
                .then(() => {
                    document.getElementById('sync-status').innerHTML = '<i class="fas fa-check-circle text-success"></i> Tersimpan';
                });
            }, 1000);
        }

        form.addEventListener('input', sync);

        document.getElementById('btn-tambah-9').addEventListener('click', () => {
            const row = tbody.querySelector('tr').cloneNode(true);
            row.querySelectorAll('input').forEach(i => i.value = '');
            tbody.appendChild(row);
            updateNo();
        });

        tbody.addEventListener('click', e => {
            const btn = e.target.closest('.btn-hapus');
            if (btn && tbody.querySelectorAll('tr').length > 1) {
                btn.closest('tr').remove();
                updateNo(); sync();
            }
        });

        function updateNo() {
            tbody.querySelectorAll('.no').forEach((td, i) => td.textContent = i + 1);
        }
    });
</script>
{% endblock %}
