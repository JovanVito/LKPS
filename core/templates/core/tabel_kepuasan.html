{% extends 'core/base.html' %}
{% block content %}
<form id="form-kepuasan" method="POST">
    {% csrf_token %}
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0 fw-bold">Tabel Kepuasan Pengguna Lulusan</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table align-middle text-center mb-0">
                    <thead class="table-primary text-white">
                        <tr>
                            <th rowspan="2" width="5%">No</th>
                            <th rowspan="2" width="35%">Aspek yang Diukur</th>
                            <th colspan="4">Tingkat Kepuasan (%)</th>
                        </tr>
                        <tr>
                            <th width="15%">Sangat Baik</th>
                            <th width="15%">Baik</th>
                            <th width="15%">Cukup</th>
                            <th width="15%">Kurang</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for aspek in aspek_list %}
                        <tr>
                            <td>{{ forloop.counter }}</td>
                            <td class="text-start">{{ aspek }}</td>
                            <td><input type="number" name="sb[]" class="form-control form-control-sm" value="0" min="0" max="100"></td>
                            <td><input type="number" name="b[]" class="form-control form-control-sm" value="0" min="0" max="100"></td>
                            <td><input type="number" name="c[]" class="form-control form-control-sm" value="0" min="0" max="100"></td>
                            <td><input type="number" name="k[]" class="form-control form-control-sm" value="0" min="0" max="100"></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</form>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tbody = document.getElementById('tbody-9');
        const form = document.getElementById('form-tabel-9');
        let timer;

        function sync() {
            document.getElementById('sync-status').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
            clearTimeout(timer);
            timer = setTimeout(() => {
                fetch(window.location.pathname, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'X-Requested-With': 'XMLHttpRequest', 'X-CSRFToken': '{{ csrf_token }}' }
                })
                .then(res => res.json())
                .then(() => {
                    document.getElementById('sync-status').innerHTML = '<i class="fas fa-check-circle text-success"></i> Tersimpan';
                });
            }, 1000);
        }

        form.addEventListener('input', sync);

        document.getElementById('btn-tambah-9').addEventListener('click', () => {
            const row = tbody.querySelector('tr').cloneNode(true);
            row.querySelectorAll('input').forEach(i => i.value = '');
            tbody.appendChild(row);
            updateNo();
        });

        tbody.addEventListener('click', e => {
            const btn = e.target.closest('.btn-hapus');
            if (btn && tbody.querySelectorAll('tr').length > 1) {
                btn.closest('tr').remove();
                updateNo(); sync();
            }
        });

        function updateNo() {
            tbody.querySelectorAll('.no').forEach((td, i) => td.textContent = i + 1);
        }
    });
</script>
{% endblock %}
