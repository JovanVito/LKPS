{% extends 'core/base.html' %}
{% block content %}
<div class="card card-modern">
    <div class="card-header card-header-modern d-flex justify-content-between align-items-center">
        <div>
            <h3 class="card-title">Tabel 6: Struktur Kurikulum</h3>
            <small class="text-muted">Tuliskan struktur kurikulum berdasarkan urutan mata kuliah per semester.</small>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-success"><i class="fas fa-file-excel me-1"></i> Import Excel</button>
            <button class="btn btn-sm btn-primary" id="btn-tambah-baris">
                <i class="fas fa-plus me-1"></i> Tambah Mata Kuliah
            </button>
        </div>
    </div>
    
    <div class="card-body p-0">
        <div class="table-responsive" style="max-height: 65vh; overflow-y: auto;">
            <table class="table table-bordered table-hover align-middle mb-0 text-center" style="min-width: 1200px;">
                <thead class="table-light sticky-top" style="z-index: 2;">
                    <tr>
                        <th rowspan="2" class="align-middle bg-light" width="5%">Smt</th>
                        <th rowspan="2" class="align-middle bg-light" width="10%">Kode MK</th>
                        <th rowspan="2" class="align-middle bg-light" width="25%">Nama Mata Kuliah</th>
                        <th rowspan="2" class="align-middle bg-light" width="15%">Mata Kuliah Kompetensi</th>
                        <th colspan="3" class="bg-light">Bobot SKS</th>
                        <th rowspan="2" class="align-middle bg-light" width="5%">Aksi</th>
                    </tr>
                    <tr>
                        <th class="bg-light" width="7%">Kuliah</th>
                        <th class="bg-light" width="7%">Seminar</th>
                        <th class="bg-light" width="7%">Praktikum</th>
                    </tr>
                </thead>
                <tbody id="tbody-dinamis">
                    <tr>
                        <td><input type="number" class="form-control form-control-sm text-center auto-save-input" name="semester[]" value="1" min="1" max="8"></td>
                        <td><input type="text" class="form-control form-control-sm auto-save-input" name="kode_mk[]" placeholder="IF101"></td>
                        <td><input type="text" class="form-control form-control-sm text-start auto-save-input" name="nama_mk[]" placeholder="Algoritma & Pemrograman"></td>
                        <td>
                            <select class="form-select form-select-sm auto-save-input" name="mk_kompetensi[]">
                                <option value="Ya">Ya</option>
                                <option value="Tidak">Tidak</option>
                            </select>
                        </td>
                        <td><input type="number" class="form-control form-control-sm text-center auto-save-input" name="sks_kuliah[]" value="2"></td>
                        <td><input type="number" class="form-control form-control-sm text-center auto-save-input" name="sks_seminar[]" value="0"></td>
                        <td><input type="number" class="form-control form-control-sm text-center auto-save-input" name="sks_praktikum[]" value="1"></td>
                        <td>
                            <button type="button" class="btn btn-sm btn-outline-danger btn-hapus-baris" disabled><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tbody = document.getElementById('tbody-dinamis');
        const btnTambah = document.getElementById('btn-tambah-baris');

        function checkDeleteButtons() {
            const baris = tbody.querySelectorAll('tr');
            baris.forEach((tr) => {
                const btnHapus = tr.querySelector('.btn-hapus-baris');
                if (baris.length > 1) {
                    btnHapus.removeAttribute('disabled');
                } else {
                    btnHapus.setAttribute('disabled', 'true');
                }
            });
        }

        btnTambah.addEventListener('click', function() {
            const barisPertama = tbody.querySelector('tr');
            const barisBaru = barisPertama.cloneNode(true);
            
            // Kosongkan input teks, tapi biarkan angka default jika perlu
            const textInputs = barisBaru.querySelectorAll('input[type="text"]');
            textInputs.forEach(input => input.value = '');
            
            tbody.appendChild(barisBaru);
            checkDeleteButtons();
        });

        tbody.addEventListener('click', function(e) {
            const btnHapus = e.target.closest('.btn-hapus-baris');
            if (btnHapus && !btnHapus.hasAttribute('disabled')) {
                btnHapus.closest('tr').remove();
                checkDeleteButtons();
            }
        });
    });
</script>
{% endblock %}
